name: Sync Replication Registrations

on:
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed]
  workflow_dispatch:

concurrency:
  group: sync-registrations
  cancel-in-progress: true

permissions:
  contents: write
  issues: read

jobs:
  sync:
    name: Sync replication registrations to claims.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run sync script
        working-directory: ReFiNe_Hub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT_PATH: site/data/claims.json
        run: |
          set -euo pipefail
          python scripts/sync_replication_registrations.py

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ReFiNe_Hub/site/data/claims.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync replication registrations from issues [skip ci]"
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi